name: 'Hello World'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sample:
    name: Hello World Job
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World !"
      - run: mysql -V
      - run: git -v
      - continue-on-error: true
        run: |
          echo "Hello ${{ env.MESSAGE }}"
          echo "Hello ${{ MESSAGE }}"
          echo "Hello ${MESSAGE}"
        env:
          MESSAGE: 'world'
      - run: echo "Hello2 ${MESSAGE}"
      - name: Show GitHub Context Values
        run: |
          echo "Server URL: ${{ github.server_url }}"
          echo "Repository: ${{ github.repository }}"
          echo "Run ID    : ${{ github.run_id }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "SHA       : ${{ github.sha }}"
          echo "Ref       : ${{ github.ref }}"
          echo "Workflow  : ${{ github.workflow }}"
          echo "Job       : ${{ github.job }}"
          # Tokenは機密情報なので、通常は *** とマスクされて表示されます
          echo "Token     : ${{ github.token }}"
      - run: |
          echo $GITHUB_EVENT_NAME
